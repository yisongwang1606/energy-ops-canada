spring.datasource.url=${ENERGY_DB_URL:jdbc:postgresql://localhost:5432/energyops}
spring.datasource.username=${ENERGY_DB_USERNAME:energyops}
spring.datasource.password=${ENERGY_DB_PASSWORD:energyops}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

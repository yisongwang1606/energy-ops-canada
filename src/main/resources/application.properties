spring.application.name=energy-ops-platform
spring.datasource.url=jdbc:h2:mem:energyops;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jackson.time-zone=America/Edmonton
spring.jackson.serialization.write-dates-as-timestamps=false
spring.web.resources.cache.period=0

server.port=8080

logging.level.root=INFO
logging.level.ca.yisong.energyops=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

energy.security.jwt.secret=change-this-demo-secret-to-a-longer-string-for-production
energy.security.jwt.expiration-hours=10
energy.demo.data.file=energy_ops_sensor_readings_500.csv
energy.ml.enabled=false
energy.ml.base-url=http://localhost:8001
energy.alert.cooldown-hours=6
spring.application.name=energy-ops-platform
